<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
}

.galeria{
    column-count:5;
    column-gap:15px;
    padding:15px;
}

@media(max-width:1200px){
.galeria{
column-count:4;
}
}

@media(max-width:900px){
.galeria{
column-count:3;
}
}

@media(max-width:650px){
.galeria{
column-count:2;
}
}

@media(max-width:450px){
.galeria{
column-count:1;
}
}

.imagen{
    width:100%;
    margin-bottom:15px;
    cursor:pointer;
    border-radius:12px;
    overflow:hidden;
    background:white;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
    transition:.25s;
    break-inside:avoid;
}

.imagen:hover{
transform:scale(1.02);
}

.imagen img{
width:100%;
display:block;
}

.pdf{
padding:35px 20px;
text-align:center;
}

.pdf .icono{
font-size:70px;
margin-bottom:20px;
}

.pdf h2{
font-size:24px;
margin-bottom:10px;
}

.pdf p{
color:#666;
}

#visor{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

#visor img{

max-width:90%;
max-height:90%;
border-radius:10px;

}

#cerrar{

position:absolute;

top:25px;
right:35px;

font-size:45px;

color:white;

cursor:pointer;

user-select:none;

}

</style>

</head>

<body>

<div class="galeria" id="galeria"></div>

<div id="visor">

<div id="cerrar">&times;</div>

<img id="imagenGrande">

</div>

<script>

const elementos=[

{tipo:"imagen",archivo:"001.jpeg"},
{tipo:"imagen",archivo:"002.jpeg"},
{tipo:"imagen",archivo:"003.jpeg"},
{tipo:"imagen",archivo:"004.jpeg"},
{tipo:"imagen",archivo:"005.jpeg"},
{tipo:"imagen",archivo:"006.jpeg"},
{tipo:"imagen",archivo:"007.jpeg"},
{tipo:"imagen",archivo:"008.jpeg"},
{tipo:"imagen",archivo:"009.jpeg"},
{tipo:"imagen",archivo:"010.jpeg"},
{tipo:"imagen",archivo:"011.jpeg"},
{tipo:"imagen",archivo:"012.jpeg"},
{tipo:"imagen",archivo:"013.jpeg"},
{tipo:"imagen",archivo:"014.jpeg"},
{tipo:"imagen",archivo:"015.jpeg"},
{tipo:"imagen",archivo:"016.jpeg"},
{tipo:"imagen",archivo:"017.jpeg"},
{tipo:"imagen",archivo:"018.jpeg"},
{tipo:"imagen",archivo:"019.jpeg"},
{tipo:"imagen",archivo:"020.jpeg"},
{tipo:"imagen",archivo:"021.jpeg"},
{tipo:"imagen",archivo:"022.jpeg"},
{tipo:"imagen",archivo:"023.jpeg"},
{tipo:"imagen",archivo:"024.jpeg"},
{tipo:"imagen",archivo:"025.jpeg"},
{tipo:"imagen",archivo:"026.jpeg"},
{tipo:"imagen",archivo:"027.jpeg"},
{tipo:"imagen",archivo:"028.jpeg"},
{tipo:"imagen",archivo:"029.jpeg"},
{tipo:"imagen",archivo:"030.jpeg"},

{
tipo:"pdf",
archivo:"Productos.pdf",
titulo:"Productos"
}

];

const galeria=document.getElementById("galeria");

elementos.forEach(item=>{

if(item.tipo==="imagen"){

const div=document.createElement("div");
div.className="imagen";

div.innerHTML=`<img src="imagenes/${item.archivo}" alt="">`;

div.onclick=()=>{

document.getElementById("imagenGrande").src="imagenes/"+item.archivo;
document.getElementById("visor").style.display="flex";

}

galeria.appendChild(div);

}else{

const div=document.createElement("div");
div.className="imagen pdf";

div.innerHTML=`

<div class="icono">📕</div>

<h2>${item.titulo}</h2>

<p>Haz clic para abrir el catálogo</p>

`;

div.onclick=()=>{

window.open("pdf/"+item.archivo,"_blank");

}

galeria.appendChild(div);

}

});

const visor=document.getElementById("visor");

document.getElementById("cerrar").onclick=()=>{

visor.style.display="none";

}

visor.onclick=(e)=>{

if(e.target===visor){

visor.style.display="none";

}

}

</script>

</body>
</html>
